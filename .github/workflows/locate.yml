name: guess

on:
  push:

jobs:
  entrance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        barn: ["impression", "appreciation", "hit", "kindergarten", "breakthrough"]
        partner: ["interpretation", "dependent", "lamb", "axis"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar Ep.jar
